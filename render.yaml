# Render.com Deployment Configuration for Fresh Bazar Backend
# IMPORTANT: Use Supabase connection pooler URL for IPv4 compatibility with Render
# Get your pooler URL from: Supabase Dashboard > Project Settings > Database > Connection Pooling
#
# Format: postgresql://postgres.PASSWORD@aws-0-REGION.pooler.supabase.com:6543/postgres
# Or use the direct URL with DB_SSL=true:
#   postgresql://postgres:PASSWORD@db.PROJECT_ID.supabase.co:5432/postgres?sslmode=require

services:
  - type: web
    name: freshbazar-backend
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Option 1: Use full DATABASE_URL (RECOMMENDED for Supabase)
      # Get from Supabase Dashboard > Project Settings > Database > Connection String
      - key: DATABASE_URL
        sync: false  # Set in dashboard: postgresql://postgres:PASSWORD@db.XXX.supabase.co:5432/postgres
      # Option 2: Use individual variables (fallback if DATABASE_URL not set)
      - key: DB_HOST
        value: db.kvyjqqtkpozxpvuoalyw.supabase.co
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: postgres
      - key: DB_SSL
        value: "true"
      - key: CORS_ORIGIN
        value: "*"
      - key: CORS_CREDENTIALS
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_FILE_SIZE
        value: "5242880"
    healthCheckPath: /health
    autoDeploy: true

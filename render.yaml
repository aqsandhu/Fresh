# Render.com Deployment Configuration for Fresh Bazar Backend
# IMPORTANT: Use Supabase connection pooler URL for IPv4 compatibility with Render
# Get your pooler URL from: Supabase Dashboard > Project Settings > Database > Connection Pooling
#
# Format: postgresql://postgres.PASSWORD@aws-0-REGION.pooler.supabase.com:6543/postgres
# Or use the direct URL with DB_SSL=true:
#   postgresql://postgres:PASSWORD@db.PROJECT_ID.supabase.co:5432/postgres?sslmode=require

services:
  - type: web
    name: freshbazar-backend
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: npm install && npm run build
    # Apply versioned SQL migrations before the new API process receives traffic.
    preDeployCommand: npm run migrate:sql
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Option 1: Use full DATABASE_URL (RECOMMENDED for Supabase)
      # Get from Supabase Dashboard > Project Settings > Database > Connection String
      - key: DATABASE_URL
        sync: false  # Set in dashboard: postgresql://postgres:PASSWORD@db.XXX.supabase.co:5432/postgres
      - key: DATABASE_MIGRATION_URL
        sync: false  # Optional direct :5432 URL if pooler blocks ALTER TABLE
      # Option 2: Use individual variables (fallback if DATABASE_URL not set)
      # DB_HOST intentionally has no committed value — a public repo must not
      # advertise the database hostname/project id. Set it in the dashboard.
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: postgres
      - key: DB_SSL
        value: "true"
      # Supabase's pooler (:6543) and direct (:5432) endpoints present a
      # SELF-SIGNED certificate that is not in the system CA store. Without
      # this, a production boot with no pinned DB_SSL_CA would attempt
      # system-CA verification and crash with SELF_SIGNED_CERT_IN_CHAIN
      # (first-deploy boot failure). dbSsl.ts already defaults to unverified
      # in production when DB_SSL_CA is absent; pinning it explicitly here
      # silences the fallback warning. To upgrade to verified TLS, set
      # DB_SSL_CA (dashboard) and REMOVE this key.
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "2000"
      - key: CORS_ORIGIN
        value: "https://freshbazar.pk,https://www.freshbazar.pk,https://freshbazar-admin.vercel.app,https://admin.freshbazar.pk"
      - key: CORS_CREDENTIALS
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Short-lived access token + rotating refresh. The 7d/30d values that
      # used to live here defeated the JWT hardening — a leaked access token
      # gave a week of full access and a leaked refresh gave a month.
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ADMIN_JWT_EXPIRES_IN
        value: 15m
      - key: ADMIN_JWT_REFRESH_EXPIRES_IN
        value: 8h
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: OTP_BYPASS_ENABLED
        sync: false  # true = fixed OTP (temporary dev). false = production Firebase OTP
      - key: OTP_BYPASS_CODE
        value: "123789"
      # Supabase Storage — persistent object storage for uploaded images.
      # Render's free disk is ephemeral (wiped on every container restart),
      # so the previous /uploads disk approach lost every uploaded file.
      # Set these in the Render dashboard.
      - key: SUPABASE_URL
        sync: false  # https://<project-id>.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false  # Project Settings -> API -> service_role secret
      - key: SUPABASE_STORAGE_BUCKET
        value: uploads
    healthCheckPath: /health
    autoDeploy: true

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshBazar Rider App - Expo QR Code</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #4ade80; font-size: 16px; margin-bottom: 24px; }
    #qrcode {
      background: white;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 20px;
    }
    #qrcode canvas { display: block; }
    .url {
      background: rgba(0,0,0,0.3);
      padding: 10px 20px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      margin-bottom: 16px;
      word-break: break-all;
    }
    .instructions {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      max-width: 350px;
      line-height: 1.6;
    }
    .instructions strong { color: #4ade80; }
    .step { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛵 FreshBazar Rider App</h1>
    <p class="subtitle">Scan with Expo Go</p>
    <div id="qrcode"></div>
    <div class="url" id="url"></div>
    <div class="instructions">
      <div class="step">1. Phone par <strong>Expo Go</strong> app kholain</div>
      <div class="step">2. <strong>Scan QR Code</strong> button dabayein</div>
      <div class="step">3. Ye QR code scan karein</div>
      <div class="step">4. Dono devices <strong>same WiFi</strong> par hon</div>
    </div>
  </div>
  <script>
    const ip = '192.168.34.226';
    const port = '8081';
    const expoUrl = `exp://${ip}:${port}`;
    document.getElementById('url').textContent = expoUrl;
    QRCode.toCanvas(document.createElement('canvas'), expoUrl, {
      width: 280,
      margin: 0,
      color: { dark: '#000000', light: '#ffffff' }
    }, function(error, canvas) {
      if (error) {
        document.getElementById('qrcode').textContent = 'QR generation failed: ' + error;
        return;
      }
      document.getElementById('qrcode').appendChild(canvas);
    });
  </script>
</body>
</html>

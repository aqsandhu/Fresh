name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build shared packages
        run: pnpm --filter @freshbazar/shared-types build && pnpm --filter @freshbazar/core-auth build

      - name: Type check all packages
        run: pnpm -r typecheck

      - name: Lint all packages
        run: pnpm -r lint

      - name: Check formatting
        run: pnpm -r format:check || true

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # Hard-fail on any CRITICAL advisory (currently 0) so a new one blocks the
      # PR instead of silently accumulating. Moderate/high are reported but not
      # blocking yet — the remaining highs are non-reachable (glob CLI) or need
      # the Next 15 major bump, tracked separately.
      - name: Audit dependencies (block on critical)
        run: pnpm audit --audit-level critical

      - name: Audit report (moderate+, non-blocking)
        run: pnpm audit --audit-level moderate || true

      - name: Check for outdated packages
        run: pnpm outdated || true

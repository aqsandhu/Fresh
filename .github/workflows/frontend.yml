name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths: ['admin-panel/**', 'website/**', 'customer-app/**', 'rider-app/**', 'packages/**', '.github/workflows/frontend.yml']
  pull_request:
    branches: [main, develop]
    paths: ['admin-panel/**', 'website/**', 'customer-app/**', 'rider-app/**', 'packages/**']

jobs:
  test-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter @freshbazar/shared-types build
      - run: pnpm --filter @freshbazar/admin-panel test --coverage
      - run: pnpm --filter @freshbazar/admin-panel build
      - uses: actions/upload-artifact@v4
        with:
          name: admin-coverage
          path: admin-panel/coverage/

  test-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter @freshbazar/shared-types build
      - run: pnpm --filter @freshbazar/website test --coverage
      - run: pnpm --filter @freshbazar/website build
      - uses: actions/upload-artifact@v4
        with:
          name: website-coverage
          path: website/coverage/

  deploy-website:
    needs: test-website
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter @freshbazar/shared-types build
      - run: pnpm --filter @freshbazar/website build
      - name: Deploy to Vercel
        uses: vercel/action-deploy@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_WEBSITE_PROJECT_ID }}
          working-directory: website

  deploy-admin:
    needs: test-admin
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter @freshbazar/shared-types build
      - run: pnpm --filter @freshbazar/admin-panel build
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: admin-panel/dist
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_ADMIN_SITE_ID }}

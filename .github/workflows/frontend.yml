name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths: ['admin-panel/**', 'website/**', 'customer-app/**', 'rider-app/**', 'packages/**', '.github/workflows/frontend.yml']
  pull_request:
    branches: [main, develop]
    paths: ['admin-panel/**', 'website/**', 'customer-app/**', 'rider-app/**', 'packages/**']

jobs:
  test-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter @freshbazar/shared-types build && pnpm --filter @freshbazar/core-auth build
      - run: pnpm --filter freshbazar-admin typecheck
      - run: pnpm --filter freshbazar-admin test
      - run: pnpm --filter freshbazar-admin build
      - uses: actions/upload-artifact@v4
        with:
          name: admin-coverage
          path: admin-panel/coverage/

  test-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter @freshbazar/shared-types build && pnpm --filter @freshbazar/core-auth build
      - run: pnpm --filter freshbazar-website typecheck
      - run: pnpm --filter freshbazar-website test
      - name: Build website
        run: pnpm --filter freshbazar-website build
        env:
          # Build-time inlined by Next — must match website/vercel.json.
          NEXT_PUBLIC_API_URL: https://freshbazar-backend.onrender.com/api
      - uses: actions/upload-artifact@v4
        with:
          name: website-coverage
          path: website/coverage/

  test-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter @freshbazar/shared-types build && pnpm --filter @freshbazar/core-auth build
      - run: pnpm --filter @freshbazar/customer-app test
      - run: pnpm --filter @freshbazar/rider-app test

  deploy-website:
    needs: test-website
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter @freshbazar/shared-types build && pnpm --filter @freshbazar/core-auth build
      - name: Build website
        run: pnpm --filter freshbazar-website build
        env:
          # Build-time inlined by Next — must match website/vercel.json.
          NEXT_PUBLIC_API_URL: https://freshbazar-backend.onrender.com/api
      # Deploy via the official Vercel CLI (the vercel/action-deploy action
      # does not exist). The CLI reads VERCEL_ORG_ID / VERCEL_PROJECT_ID from
      # the environment automatically.
      - name: Deploy to Vercel
        working-directory: website
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEBSITE_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prod --token="$VERCEL_TOKEN"

  deploy-admin:
    needs: test-admin
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter @freshbazar/shared-types build && pnpm --filter @freshbazar/core-auth build
      - run: pnpm --filter freshbazar-admin build
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: admin-panel/dist
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_ADMIN_SITE_ID }}

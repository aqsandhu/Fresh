name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths: ['backend/**', 'packages/**', '.github/workflows/backend.yml']
  pull_request:
    branches: [main, develop]
    paths: ['backend/**', 'packages/**']

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: freshbazar_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build shared types
        run: pnpm --filter @freshbazar/shared-types build

      - name: Run backend tests
        run: pnpm --filter @freshbazar/backend test --coverage
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: freshbazar_test
          JWT_SECRET: test-secret-key-for-ci-only
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci-only

      - name: Type check
        run: pnpm --filter @freshbazar/backend typecheck

      - name: Lint
        run: pnpm --filter @freshbazar/backend lint

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter @freshbazar/shared-types build
      - run: pnpm --filter @freshbazar/backend build
      - uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}
